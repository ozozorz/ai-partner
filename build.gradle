plugins {
	id 'net.fabricmc.fabric-loom' version "${loom_version}"
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

loom {
	splitEnvironmentSourceSets()

	mods {
		"ai-partner" {
			sourceSet sourceSets.main
			sourceSet sourceSets.client
		}
	}
}

dependencies {
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	implementation "net.fabricmc:fabric-loader:${project.loader_version}"
	implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"

	testImplementation "org.junit.jupiter:junit-jupiter:5.11.4"
	testImplementation("com.networknt:json-schema-validator:2.0.4") {
		exclude group: "com.fasterxml.jackson.dataformat", module: "jackson-dataformat-yaml"
		exclude group: "com.ethlo.time", module: "itu"
	}
	testRuntimeOnly "org.junit.platform:junit-platform-launcher:1.11.4"
}

def expandedModVersion = version

processResources {
	inputs.property "version", expandedModVersion

	filesMatching("fabric.mod.json") {
		expand "version": expandedModVersion
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 25
	it.options.encoding = 'UTF-8'
	it.options.compilerArgs.addAll(['-Xlint:deprecation'])
}

java {
	withSourcesJar()
	sourceCompatibility = JavaVersion.VERSION_25
	targetCompatibility = JavaVersion.VERSION_25
}

test {
	useJUnitPlatform()
}

publishing {
	publications {
		create("mavenJava", MavenPublication) {
			artifactId = project.archives_base_name
			from components.java
		}
	}
}
